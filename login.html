<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — eL-BAS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a1a0b;
  position: relative;
  overflow: hidden;
}

/* BG PATTERN */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(27,94,32,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(201,150,12,0.12) 0%, transparent 60%);
  pointer-events: none;
}
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(27,94,32,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(27,94,32,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* CARD */
.login-wrap {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.login-card {
  background: rgba(15, 30, 16, 0.85);
  border: 1px solid rgba(27,94,32,0.35);
  border-radius: 24px;
  padding: 40px 36px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 32px 80px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.07);
  animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* LOGO AREA */
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #1B5E20, #2E7D32);
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(27,94,32,0.4);
  border: 1px solid rgba(255,255,255,0.1);
}
.login-logo h1 {
  font-size: 1.4rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: .5px;
}
.login-logo p {
  font-size: .78rem;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* FORM */
.field {
  margin-bottom: 18px;
  position: relative;
}
.field label {
  display: block;
  font-size: .75rem;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.input-wrap {
  position: relative;
}
.input-wrap i.ico {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.3);
  font-size: .85rem;
  pointer-events: none;
  transition: color .2s;
}
.input-wrap input:focus ~ i.ico,
.input-wrap input:focus + * i.ico { color: #43A047; }
.input-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: #fff;
  font-family: inherit;
  font-size: .9rem;
  padding: 13px 44px 13px 42px;
  outline: none;
  transition: all .25s;
  caret-color: #43A047;
}
.input-wrap input::placeholder { color: rgba(255,255,255,0.2); }
.input-wrap input:focus {
  border-color: rgba(67,160,71,0.7);
  background: rgba(67,160,71,0.06);
  box-shadow: 0 0 0 3px rgba(67,160,71,0.15);
}
.input-wrap input.error {
  border-color: rgba(229,57,53,0.7);
  background: rgba(229,57,53,0.06);
  box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
}
.toggle-pw {
  position: absolute;
  right: 13px; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.25);
  cursor: pointer;
  font-size: .85rem;
  transition: color .2s;
  border: none;
  background: none;
  padding: 4px;
}
.toggle-pw:hover { color: rgba(255,255,255,0.6); }
/* CAPTCHA */
.captcha-row {
  display: grid;
  grid-template-columns: auto 36px 1fr;
  align-items: center;
  gap: 8px;
  margin-bottom: 22px;
}
.captcha-box {
  flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: .88rem;
  font-weight: 700;
  color: #F5C842;
  letter-spacing: 3px;
  font-family: 'Courier New', monospace;
  user-select: none;
  cursor: default;
  min-width: 0; /* <-- ini kuncinya, hapus min-width lama */
  text-align: center;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}
.captcha-box::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 4px,
    rgba(255,255,255,0.02) 4px,
    rgba(255,255,255,0.02) 5px
  );
}
.captcha-reload {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  font-size: .85rem;
  padding: 6px;
  border-radius: 8px;
  transition: all .2s;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.captcha-reload:hover { color: #fff; background: rgba(255,255,255,0.07); }
.captcha-input {
  min-width: 0; /* penting buat grid */
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #fff;
  font-family: inherit;
  font-size: .88rem;
  padding: 11px 12px;
  outline: none;
  transition: all .25s;
}
.captcha-input::placeholder { color: rgba(255,255,255,0.2); font-size: .78rem; }
.captcha-input:focus {
  border-color: rgba(67,160,71,0.7);
  background: rgba(67,160,71,0.06);
  box-shadow: 0 0 0 3px rgba(67,160,71,0.15);
}
.captcha-input.error {
  border-color: rgba(229,57,53,0.7);
}
/* BTN LOGIN */
.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #1B5E20, #2E7D32);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: .92rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
  transition: all .25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(27,94,32,0.35);
  position: relative;
  overflow: hidden;
}
.btn-login::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #2E7D32, #43A047);
  opacity: 0;
  transition: opacity .25s;
}
.btn-login:hover::before { opacity: 1; }
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(27,94,32,0.4); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled {
  opacity: .5; cursor: not-allowed;
  transform: none !important;
}
.btn-login span { position: relative; z-index: 1; }

/* ALERT */
.alert {
  border-radius: 10px;
  padding: 11px 14px;
  font-size: .82rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 20px;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.alert-error {
  background: rgba(229,57,53,0.12);
  border: 1px solid rgba(229,57,53,0.3);
  color: #ef9a9a;
}
.alert-warn {
  background: rgba(255,193,7,0.1);
  border: 1px solid rgba(255,193,7,0.25);
  color: #ffe082;
}
.alert-success {
  background: rgba(67,160,71,0.12);
  border: 1px solid rgba(67,160,71,0.3);
  color: #a5d6a7;
}

/* LOCKOUT BAR */
.lockout-bar {
  background: rgba(229,57,53,0.08);
  border: 1px solid rgba(229,57,53,0.25);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: none;
}
.lockout-bar p {
  font-size: .8rem;
  color: #ef9a9a;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.lockout-progress {
  height: 4px;
  background: rgba(229,57,53,0.2);
  border-radius: 4px;
  overflow: hidden;
}
.lockout-fill {
  height: 100%;
  background: #e53935;
  border-radius: 4px;
  transition: width .5s linear;
}

/* ATTEMPTS */
.attempts-hint {
  text-align: center;
  font-size: .72rem;
  color: rgba(255,255,255,0.25);
  margin-top: 16px;
  font-weight: 500;
}
.attempts-hint span { color: #ef9a9a; font-weight: 700; }

/* FOOTER */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: .72rem;
  color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🕌</div>
      <h1>eL-BAS Admin</h1>
      <p>Panel Kontrol</p>
    </div>

    <div id="alertBox"></div>

    <!-- LOCKOUT -->
    <div class="lockout-bar" id="lockoutBar">
      <p><i class="fas fa-lock"></i> <span id="lockoutMsg">Terlalu banyak percobaan. Tunggu sebentar.</span></p>
      <div class="lockout-progress"><div class="lockout-fill" id="lockoutFill" style="width:100%"></div></div>
    </div>

    <!-- FORM -->
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Masukkan username"
               autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false"
               oninput="clearErr()" onkeydown="onEnter(event)">
        <i class="fas fa-user ico"></i>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Masukkan password"
               autocomplete="current-password"
               oninput="clearErr()" onkeydown="onEnter(event)">
        <i class="fas fa-lock ico"></i>
        <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn" tabindex="-1">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <!-- CAPTCHA -->
    <div id="captchaSection">
      <div style="margin-bottom:8px;font-size:.75rem;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase">
        Verifikasi
      </div>
      <div class="captcha-row">
        <div class="captcha-box" id="captchaText"></div>
        <button type="button" class="captcha-reload" onclick="genCaptcha()" title="Ganti kode">
          <i class="fas fa-sync-alt"></i>
        </button>
        <input type="text" class="captcha-input" id="captchaInput"
               placeholder="Ketik kode di atas"
               autocomplete="off" autocorrect="off" maxlength="6"
               oninput="clearErr()" onkeydown="onEnter(event)">
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="loginAdmin()">
      <span><i class="fas fa-sign-in-alt"></i> &nbsp;Masuk ke Panel Admin</span>
    </button>

    <div class="attempts-hint" id="attemptsHint" style="display:none">
      Percobaan tersisa: <span id="attemptsLeft">5</span>
    </div>
  </div>
  <div class="login-footer">
    © 2026 eL-BAS Official · Pondok Pesantren Darul Ma'arif Ciamis
  </div>
</div>
<script>
// ============================================================
// KONFIGURASI AKUN — MULTI USER (Simpan di localStorage)
// ============================================================
const STORAGE_KEY_ACCOUNTS = '__elb_adm_v2';
const SESSION_KEY = '__elb_ses';

// DEFAULT ACCOUNTS (akan di-load pertama kali)
const DEFAULT_ACCOUNTS = [
  { username: 'admin', password: 'admin123', role: 'superadmin', name: 'Administrator' },
  { username: 'bendahara', password: 'bendahara123', role: 'bendahara', name: 'Bendahara' },
  { username: 'sekretaris', password: 'sekretaris123', role: 'sekretaris', name: 'Sekretaris' }
];

// ============================================================
// INIT ACCOUNTS
// ============================================================
function initAccounts() {
  const stored = localStorage.getItem(STORAGE_KEY_ACCOUNTS);
  if (!stored) {
    // Simpan default accounts
    localStorage.setItem(STORAGE_KEY_ACCOUNTS, JSON.stringify(DEFAULT_ACCOUNTS));
    return DEFAULT_ACCOUNTS;
  }
  return JSON.parse(stored);
}

function getAccounts() {
  const stored = localStorage.getItem(STORAGE_KEY_ACCOUNTS);
  if (!stored) return initAccounts();
  return JSON.parse(stored);
}

function saveAccounts(accounts) {
  localStorage.setItem(STORAGE_KEY_ACCOUNTS, JSON.stringify(accounts));
}

// ============================================================
// BRUTE FORCE PROTECTION
// ============================================================
const RATE = {
  maxAttempts: 5,
  lockDuration: 300, // 5 menit
  storageKey: '__elb_rt',

  get() {
    try { return JSON.parse(sessionStorage.getItem(this.storageKey)) || { count: 0, lockedUntil: 0 }; }
    catch(e) { return { count: 0, lockedUntil: 0 }; }
  },
  save(d) {
    try { sessionStorage.setItem(this.storageKey, JSON.stringify(d)); } catch(e) {}
  },
  isLocked() {
    const d = this.get();
    return d.lockedUntil > Date.now();
  },
  lockRemaining() {
    const d = this.get();
    return Math.max(0, Math.ceil((d.lockedUntil - Date.now()) / 1000));
  },
  increment() {
    const d = this.get();
    d.count++;
    if (d.count >= this.maxAttempts) {
      d.lockedUntil = Date.now() + this.lockDuration * 1000;
      d.count = 0;
    }
    this.save(d);
    return d;
  },
  reset() {
    this.save({ count: 0, lockedUntil: 0 });
  },
  remaining() {
    const d = this.get();
    return Math.max(0, this.maxAttempts - d.count);
  }
};

// ============================================================
// SESSION
// ============================================================
function createSession(username, role, name) {
  const exp = Date.now() + 8 * 60 * 60 * 1000; // 8 jam
  const session = { username, role, name, exp };
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
  return session;
}

function checkSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (!s) return null;
    if (s.exp < Date.now()) { sessionStorage.removeItem(SESSION_KEY); return null; }
    return s;
  } catch(e) { return null; }
}

// ============================================================
// CAPTCHA
// ============================================================
let captchaAnswer = '';
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

function genCaptcha() {
  captchaAnswer = Array.from(crypto.getRandomValues(new Uint8Array(5)))
    .map(n => CHARS[n % CHARS.length]).join('');
  const el = document.getElementById('captchaText');
  if (el) el.textContent = captchaAnswer;
  const inp = document.getElementById('captchaInput');
  if (inp) { inp.value = ''; inp.classList.remove('error'); }
}

// ============================================================
// UI HELPERS
// ============================================================
function showAlert(type, msg) {
  const box = document.getElementById('alertBox');
  if (!box) return;
  const icons = { error: 'fa-circle-exclamation', warn: 'fa-triangle-exclamation', success: 'fa-circle-check' };
  box.innerHTML = `
    <div class="alert alert-${type}">
      <i class="fas ${icons[type]||'fa-circle-info'}"></i>
      <span>${msg}</span>
    </div>
  `;
}
function clearAlert() { const b = document.getElementById('alertBox'); if (b) b.innerHTML = ''; }

function togglePw() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIcon');
  if (!inp) return;
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'fas fa-eye';
  }
}

function setFormDisabled(v) {
  ['username','password','captchaInput','btnLogin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = v;
  });
}

function onEnter(e) {
  if (e.key === 'Enter') loginAdmin();
}

let lockTimer = null;
function showLockout(seconds) {
  const bar = document.getElementById('lockoutBar');
  const msg = document.getElementById('lockoutMsg');
  const fill = document.getElementById('lockoutFill');
  if (!bar) return;

  bar.style.display = 'block';
  setFormDisabled(true);

  const total = seconds;
  const tick = () => {
    const rem = RATE.lockRemaining();
    if (rem <= 0) {
      bar.style.display = 'none';
      setFormDisabled(false);
      clearAlert();
      if (fill) fill.style.width = '0%';
      genCaptcha();
      return;
    }
    const m = Math.floor(rem / 60), s = rem % 60;
    if (msg) msg.textContent = `Terlalu banyak percobaan. Tunggu ${m > 0 ? m+'m ' : ''}${s}s`;
    if (fill) fill.style.width = (rem / total * 100) + '%';
    lockTimer = setTimeout(tick, 1000);
  };
  tick();
}

function updateAttemptsHint() {
  const hint = document.getElementById('attemptsHint');
  const left = document.getElementById('attemptsLeft');
  const remaining = RATE.remaining();
  const d = RATE.get();

  if (d.count > 0 && remaining < RATE.maxAttempts) {
    if (hint) hint.style.display = 'block';
    if (left) left.textContent = remaining;
  } else {
    if (hint) hint.style.display = 'none';
  }
}

// ============================================================
// LOGIN UTAMA (Multi-User)
// ============================================================
async function loginAdmin() {
  clearAlert();

  if (RATE.isLocked()) {
    showLockout(RATE.lockRemaining());
    return;
  }

  const username = (document.getElementById('username')?.value || '').trim();
  const password = document.getElementById('password')?.value || '';
  const captchaInput = (document.getElementById('captchaInput')?.value || '').toUpperCase().trim();

  if (!username || !password) {
    showAlert('error', 'Username dan password wajib diisi.');
    return;
  }

  if (!captchaInput) {
    document.getElementById('captchaInput')?.classList.add('error');
    showAlert('error', 'Masukkan kode verifikasi.');
    return;
  }

  if (captchaInput !== captchaAnswer) {
    document.getElementById('captchaInput')?.classList.add('error');
    genCaptcha();
    const d = RATE.increment();
    updateAttemptsHint();
    if (RATE.isLocked()) { showLockout(RATE.lockRemaining()); return; }
    showAlert('error', `Kode verifikasi salah. (${RATE.remaining()} percobaan tersisa)`);
    return;
  }

  setFormDisabled(true);
  const btn = document.getElementById('btnLogin');
  if (btn) btn.innerHTML = '<span><i class="fas fa-spinner fa-spin"></i> Memverifikasi...</span>';

  await new Promise(r => setTimeout(r, 500));

  const accounts = getAccounts();
  const user = accounts.find(u => u.username.toLowerCase() === username.toLowerCase());

  if (user && user.password === password) {
    RATE.reset();
    createSession(user.username, user.role, user.name);
    if (btn) btn.innerHTML = '<span><i class="fas fa-check"></i> Berhasil!</span>';
    showAlert('success', `Selamat datang, ${user.name}! Mengalihkan...`);
    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 800);
  } else {
    const d = RATE.increment();
    updateAttemptsHint();
    genCaptcha();
    setFormDisabled(false);
    if (btn) btn.innerHTML = '<span><i class="fas fa-sign-in-alt"></i> Masuk ke Panel Admin</span>';

    if (RATE.isLocked()) {
      showLockout(RATE.lockRemaining());
    } else {
      showAlert('error', `Username atau password salah. (${RATE.remaining()} percobaan tersisa)`);
      const card = document.querySelector('.login-card');
      if (card) {
        card.style.animation = 'shake .4s ease';
        setTimeout(() => { card.style.animation = ''; }, 400);
      }
    }
  }
}

// ============================================================
// FUNGSI MANAJEMEN USER (Bisa dipanggil dari console)
// ============================================================
window.addUser = function(username, password, role, name) {
  const accounts = getAccounts();
  if (accounts.find(u => u.username === username)) {
    console.error('❌ Username sudah ada!');
    return false;
  }
  accounts.push({ username, password, role, name });
  saveAccounts(accounts);
  console.log(`✅ User ${username} berhasil ditambahkan!`);
  return true;
};

window.removeUser = function(username) {
  let accounts = getAccounts();
  if (username === 'admin') {
    console.error('❌ Tidak bisa menghapus user admin utama!');
    return false;
  }
  accounts = accounts.filter(u => u.username !== username);
  saveAccounts(accounts);
  console.log(`✅ User ${username} berhasil dihapus!`);
  return true;
};

window.listUsers = function() {
  const accounts = getAccounts();
  console.table(accounts.map(u => ({ username: u.username, role: u.role, name: u.name })));
  return accounts;
};

window.changePassword = function(username, newPassword) {
  const accounts = getAccounts();
  const user = accounts.find(u => u.username === username);
  if (!user) {
    console.error('❌ User tidak ditemukan!');
    return false;
  }
  user.password = newPassword;
  saveAccounts(accounts);
  console.log(`✅ Password untuk ${username} berhasil diubah!`);
  return true;
};

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  if (checkSession()) {
    window.location.href = 'admin.html';
    return;
  }

  initAccounts();
  genCaptcha();

  if (RATE.isLocked()) {
    showLockout(RATE.lockRemaining());
  }
  updateAttemptsHint();
});
</script>
