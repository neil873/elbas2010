<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Berita — eL-BAS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Open Sans',sans-serif;background:#fff;color:#222;font-size:15px}

/* TOPBAR */
.topbar{background:#1B5E20;padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.topbar-logo img{height:32px;width:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:contain}
.topbar-logo span{color:#fff;font-family:'Merriweather',serif;font-weight:700;font-size:1rem}
.topbar-back{color:rgba(255,255,255,.85);text-decoration:none;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:5px}
.topbar-back:hover{color:#fff}

/* SITE HEADER */
.site-header{border-bottom:3px solid #1B5E20;padding:12px 0 10px;text-align:center;background:#fff}
.site-name{font-family:'Merriweather',serif;font-size:1.6rem;font-weight:900;color:#1B5E20;letter-spacing:1px}
.site-tagline{font-size:.72rem;color:#888;margin-top:2px;letter-spacing:2px;text-transform:uppercase}

/* LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;display:grid;grid-template-columns:1fr 290px;gap:28px}

/* BREADCRUMB */
.breadcrumb{font-size:.78rem;color:#888;display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #eee}
.breadcrumb a{color:#1B5E20;text-decoration:none;font-weight:600}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb i{font-size:.6rem;color:#bbb}

/* ARTIKEL */
.article{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.a-cat{display:inline-block;font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:#1B5E20;margin-bottom:12px}
.a-cat.Akademik{background:#1565C0}.a-cat.Pesantren{background:#6A1B9A}
.a-cat.Prestasi{background:#E65100}.a-cat.Pengumuman{background:#00695C}

.a-title{font-family:'Merriweather',serif;font-size:clamp(1.3rem,4vw,1.85rem);font-weight:900;color:#111;line-height:1.35;margin-bottom:14px;border-left:5px solid #1B5E20;padding-left:12px}

.a-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:.78rem;color:#888;padding:10px 0;border-top:1px solid #eee;border-bottom:1px solid #eee;margin-bottom:20px}
.a-meta span{display:flex;align-items:center;gap:5px}
.a-meta i{color:#1B5E20;font-size:.7rem}

.a-img{width:100%;margin-bottom:6px;border-radius:3px;overflow:hidden;background:#f5f5f5;line-height:0}
.a-img img{width:100%;display:block;object-fit:cover}
.a-caption{font-size:.72rem;color:#999;text-align:center;margin-bottom:22px;font-style:italic;padding:4px 0;border-bottom:1px solid #f0f0f0}

.a-body{font-size:1rem;line-height:1.95;color:#2a2a2a;font-family:'Open Sans',sans-serif}
.a-body p{margin-bottom:16px}

/* SHARE */
.a-share{margin-top:28px;padding-top:16px;border-top:2px solid #eee;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.share-label{font-size:.8rem;font-weight:700;color:#888}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:3px;font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s;cursor:pointer;border:none;font-family:inherit}
.share-wa{background:#25D366;color:#fff}
.share-wa:hover{background:#1da851}
.share-fb{background:#1877F2;color:#fff}
.share-fb:hover{background:#0d6efd}
.share-back{background:#f0f0f0;color:#333}
.share-back:hover{background:#e0e0e0}

/* TERKAIT */
.related{margin-top:36px;padding-top:18px;border-top:3px solid #1B5E20}
.related-title{font-family:'Merriweather',serif;font-size:1rem;font-weight:700;color:#111;margin-bottom:16px}
.related-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.r-item{text-decoration:none;display:flex;gap:10px;padding:10px;border:1px solid #eee;border-radius:3px;transition:background .2s}
.r-item:hover{background:#f9f9f9}
.r-thumb{width:76px;height:58px;border-radius:3px;overflow:hidden;flex-shrink:0;background:#f0f0f0}
.r-thumb img{width:100%;height:100%;object-fit:cover}
.r-body h4{font-family:'Merriweather',serif;font-size:.78rem;font-weight:700;color:#111;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.r-body h4:hover{color:#1B5E20}
.r-body p{font-size:.68rem;color:#999;margin-top:4px}

/* NOT FOUND */
.not-found{text-align:center;padding:60px 24px;color:#999}
.not-found i{font-size:3rem;opacity:.15;margin-bottom:16px;display:block}
.not-found h3{font-family:'Merriweather',serif;font-size:1.1rem;font-weight:700;color:#333;margin-bottom:8px}
.not-found a{display:inline-flex;align-items:center;gap:6px;margin-top:18px;background:#1B5E20;color:#fff;padding:9px 20px;border-radius:3px;text-decoration:none;font-weight:700;font-size:.85rem}

/* SIDEBAR */
.sidebar{}
.sb-box{border:1px solid #e8e8e8;border-radius:4px;overflow:hidden;margin-bottom:20px}
.sb-head{background:#1B5E20;color:#fff;padding:10px 14px;font-family:'Merriweather',serif;font-size:.85rem;font-weight:700}
.sb-body{padding:0}
.sb-item{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid #f0f0f0;transition:background .2s;cursor:pointer}
.sb-item:last-child{border-bottom:none}
.sb-item:hover{background:#f9f9f9}
.sb-thumb{width:62px;height:48px;border-radius:3px;overflow:hidden;flex-shrink:0;background:#f0f0f0}
.sb-thumb img{width:100%;height:100%;object-fit:cover}
.sb-info a{font-size:.78rem;font-weight:600;color:#222;text-decoration:none;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sb-info a:hover{color:#1B5E20}
.sb-info p{font-size:.68rem;color:#999;margin-top:3px}

@media(max-width:860px){.wrap{grid-template-columns:1fr}.sidebar{display:none}}
@media(max-width:520px){
  .wrap{padding:14px 12px 48px}
  .related-grid{grid-template-columns:1fr}
  .a-title{font-size:1.2rem}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">
    <img src="img/logo-darulma'arif.png" alt="Logo">
    <span>eL-BAS</span>
  </a>
  <a class="topbar-back" href="berita.html"><i class="fas fa-arrow-left"></i> Berita</a>
</div>

<div class="site-header">
  <div class="site-name">eL-BAS NEWS</div>
  <div class="site-tagline">Berita & Informasi Pondok Pesantren Darul Ma'arif Ciamis</div>
</div>

<div class="wrap">
  <main>
    <nav class="breadcrumb">
      <a href="index.html">home</a>
      <i class="fas fa-chevron-right"></i>
      <a href="berita.html">berita</a>
      <i class="fas fa-chevron-right"></i>
      <span id="breadCat">...</span>
    </nav>
    <div id="detailBerita"></div>
  </main>
  <aside class="sidebar">
    <div class="sb-box">
      <div class="sb-head">Berita Lainnya</div>
      <div class="sb-body" id="sbList"></div>
    </div>
  </aside>
</div>
<script src="js/elBAS.js"></script>
</body>
</html>
