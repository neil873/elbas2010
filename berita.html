<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berita — eL-BAS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Open Sans',sans-serif;background:#fff;color:#222;font-size:15px}

/* TOPBAR */
.topbar{background:#1B5E20;padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.topbar-logo img{height:32px;width:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:contain}
.topbar-logo span{color:#fff;font-family:'Merriweather',serif;font-weight:700;font-size:1rem}
.topbar-back{color:rgba(255,255,255,.85);text-decoration:none;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:5px}
.topbar-back:hover{color:#fff}

/* SITE HEADER */
.site-header{border-bottom:3px solid #1B5E20;padding:12px 0 10px;text-align:center;background:#fff}
.site-name{font-family:'Merriweather',serif;font-size:1.6rem;font-weight:900;color:#1B5E20;letter-spacing:1px}
.site-tagline{font-size:.72rem;color:#888;margin-top:2px;letter-spacing:2px;text-transform:uppercase}

/* NAV KATEGORI */
.cat-nav{border-bottom:1px solid #ddd;background:#fff;overflow-x:auto;white-space:nowrap;padding:0 16px}
.cat-nav-inner{display:inline-flex;gap:0}
.cat-btn{padding:10px 16px;font-size:.8rem;font-weight:700;color:#555;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-family:inherit;white-space:nowrap}
.cat-btn:hover{color:#1B5E20}
.cat-btn.active{color:#1B5E20;border-bottom-color:#1B5E20}

/* LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;display:grid;grid-template-columns:1fr 290px;gap:28px}

/* BREADCRUMB */
.breadcrumb{font-size:.78rem;color:#888;display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #eee}
.breadcrumb a{color:#1B5E20;text-decoration:none;font-weight:600}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb i{font-size:.6rem;color:#bbb}

/* BERITA LIST */
.news-list{display:flex;flex-direction:column;gap:0}

/* FEATURED (item pertama) */
.news-featured{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #eee;cursor:pointer;animation:fadeUp .4s ease both}
.news-featured-img{width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:4px;margin-bottom:12px;background:#f0f0f0}
.news-featured-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.news-featured:hover .news-featured-img img{transform:scale(1.03)}
.news-featured .n-cat{margin-bottom:6px}
.news-featured .n-title{font-family:'Merriweather',serif;font-size:1.3rem;font-weight:700;color:#111;line-height:1.4;margin-bottom:8px;text-decoration:none;display:block}
.news-featured .n-title:hover{color:#1B5E20}
.news-featured .n-excerpt{font-size:.88rem;color:#555;line-height:1.65;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* NORMAL ITEM */
.news-item{display:grid;grid-template-columns:130px 1fr;gap:12px;padding:14px 0;border-bottom:1px solid #eee;cursor:pointer;animation:fadeUp .4s ease both;transition:background .2s}
.news-item:hover{background:#f9f9f9;margin:0 -8px;padding:14px 8px}
.news-thumb{width:130px;height:90px;border-radius:4px;overflow:hidden;flex-shrink:0;background:#f0f0f0}
.news-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.news-item:hover .news-thumb img{transform:scale(1.06)}
.news-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#ccc}
.news-body{display:flex;flex-direction:column;gap:4px}

/* SHARED */
.n-cat{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px;width:fit-content;color:#fff;background:#1B5E20}
.n-cat.Akademik{background:#1565C0}.n-cat.Pesantren{background:#6A1B9A}
.n-cat.Prestasi{background:#E65100}.n-cat.Pengumuman{background:#00695C}
.n-title{font-family:'Merriweather',serif;font-size:.9rem;font-weight:700;color:#111;line-height:1.45;text-decoration:none;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.n-title:hover{color:#1B5E20}
.n-meta{font-size:.72rem;color:#999;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.n-meta i{font-size:.65rem}
.n-excerpt{font-size:.82rem;color:#666;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY */
.empty{text-align:center;padding:48px;color:#aaa}
.empty i{font-size:2.5rem;display:block;margin-bottom:12px;opacity:.3}

/* SIDEBAR */
.sidebar{}
.sb-box{border:1px solid #e8e8e8;border-radius:4px;overflow:hidden;margin-bottom:20px}
.sb-head{background:#1B5E20;color:#fff;padding:10px 14px;font-family:'Merriweather',serif;font-size:.85rem;font-weight:700}
.sb-body{padding:0}
.sb-item{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid #f0f0f0;transition:background .2s;cursor:pointer}
.sb-item:last-child{border-bottom:none}
.sb-item:hover{background:#f9f9f9}
.sb-thumb{width:62px;height:48px;border-radius:3px;overflow:hidden;flex-shrink:0;background:#f0f0f0}
.sb-thumb img{width:100%;height:100%;object-fit:cover}
.sb-info a{font-size:.78rem;font-weight:600;color:#222;text-decoration:none;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sb-info a:hover{color:#1B5E20}
.sb-info p{font-size:.68rem;color:#999;margin-top:3px}

/* RESPONSIVE */
@media(max-width:860px){.wrap{grid-template-columns:1fr}.sidebar{display:none}}
@media(max-width:520px){
  .wrap{padding:14px 12px 48px}
  .news-item{grid-template-columns:100px 1fr;gap:10px}
  .news-thumb{width:100px;height:72px}
  .news-featured .n-title{font-size:1.1rem}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">
    <img src="img/logo-darulma'arif.png" alt="Logo">
    <span>eL-BAS</span>
  </a>
  <a class="topbar-back" href="index.html"><i class="fas fa-home"></i> Beranda</a>
</div>

<div class="site-header">
  <div class="site-name">eL-BAS NEWS</div>
  <div class="site-tagline">Berita & Informasi Pondok Pesantren Darul Ma'arif Ciamis</div>
</div>

<div class="cat-nav">
  <div class="cat-nav-inner">
    <button class="cat-btn active" onclick="filterBerita('semua',this)">Semua</button>
    <button class="cat-btn" onclick="filterBerita('Kegiatan',this)">Kegiatan</button>
    <button class="cat-btn" onclick="filterBerita('Akademik',this)">Akademik</button>
    <button class="cat-btn" onclick="filterBerita('Pesantren',this)">Pesantren</button>
    <button class="cat-btn" onclick="filterBerita('Prestasi',this)">Prestasi</button>
    <button class="cat-btn" onclick="filterBerita('Pengumuman',this)">Pengumuman</button>
  </div>
</div>

<div class="wrap">
  <main>
    <nav class="breadcrumb">
      <a href="index.html">home</a>
      <i class="fas fa-chevron-right"></i>
      <span>berita</span>
    </nav>
    <div class="news-list" id="newsList"></div>
  </main>
  <aside class="sidebar">
    <div class="sb-box">
      <div class="sb-head">Berita Terpopuler</div>
      <div class="sb-body" id="sbList"></div>
    </div>
  </aside>
</div>
<script src="js/elBAS.js"></script>
</body>
</html>
